openapi: 3.0.0
info:
  title: API Checkout
  description: |
    Contrato de API para el módulo de checkout del sistema ecommerce.
    Gestiona el proceso de finalización de compra: validación del carrito,
    selección de dirección de envío, aplicación de cupones y creación del pedido.
    
    Reglas de negocio:
    - El carrito debe tener al menos un ítem para iniciar el checkout.
    - El stock de cada producto es reservado al confirmar el pedido.
    - Si el pago falla, la reserva de stock se libera automáticamente.
    - El cliente recibe un email de confirmación tras un pedido exitoso.
    - Un checkout inicia un pedido con estado PENDIENTE_PAGO.
    - Los cupones de descuento se aplican sobre el subtotal antes de IVA.
  version: 1.0.0
  contact:
    name: Equipo Contratos API
servers:
  - url: /api/v1
    description: Servidor principal

security:
  - bearerAuth: []

tags:
  - name: checkout
    description: Proceso de finalización de compra

paths:
  /api/checkout/resumen:
    get:
      tags: [checkout]
      summary: Obtener resumen del checkout
      description: |
        Retorna un resumen de la compra antes de confirmarla.
        Incluye ítems del carrito, costos de envío calculados,
        descuentos aplicados y total final.
        Valida disponibilidad de stock en tiempo real.
      operationId: resumenCheckout
      responses:
        '200':
          description: Resumen del checkout listo para confirmar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumenCheckout'
        '400':
          description: Carrito vacío o con productos sin stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                codigo: "CARRITO_INVALIDO"
                mensaje: "El carrito está vacío o contiene productos sin stock"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/checkout/cupon:
    post:
      tags: [checkout]
      summary: Aplicar cupón de descuento
      description: |
        Valida y aplica un cupón de descuento al carrito activo.
        Solo puede haber un cupón activo por checkout.
        Aplica el descuento sobre el subtotal antes de IVA.
      operationId: aplicarCupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [codigo]
              properties:
                codigo:
                  type: string
                  description: Código del cupón de descuento
                  example: "PROMO2025"
      responses:
        '200':
          description: Cupón aplicado exitosamente. Retorna resumen actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumenCheckout'
        '400':
          description: Cupón inválido, expirado o ya utilizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                codigo: "CUPON_INVALIDO"
                mensaje: "El cupón ingresado no es válido o ya fue utilizado"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/checkout/confirmar:
    post:
      tags: [checkout]
      summary: Confirmar y crear el pedido
      description: |
        Procesa el checkout y crea un pedido en estado PENDIENTE_PAGO.
        Pasos internos del sistema:
        1. Valida stock disponible de todos los ítems.
        2. Reserva el stock de cada producto.
        3. Registra la dirección de envío.
        4. Crea el pedido con sus ítems.
        5. Retorna la URL de redirección al módulo de pagos.
        Si cualquier paso falla, la operación se revierte completamente (transacción atómica).
      operationId: confirmarCheckout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmarCheckoutRequest'
            example:
              direccion_envio:
                calle: "Av. Ejemplo 1234"
                ciudad: "Temuco"
                region: "La Araucanía"
                codigo_postal: "4780000"
              metodo_pago: "webpay"
              notas: "Dejar en conserjería"
      responses:
        '201':
          description: Pedido creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmarCheckoutResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Conflicto de stock durante la confirmación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                codigo: "STOCK_AGOTADO"
                mensaje: "Uno o más productos se agotaron antes de confirmar"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ResumenCheckout:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              producto_id:
                type: integer
              nombre:
                type: string
              cantidad:
                type: integer
              precio_unitario:
                type: number
              subtotal:
                type: number
        cupon_aplicado:
          type: object
          nullable: true
          properties:
            codigo:
              type: string
            tipo:
              type: string
              enum: [porcentaje, monto_fijo]
            valor:
              type: number
            descuento_aplicado:
              type: number
        subtotal:
          type: number
          description: Suma de subtotales antes de descuento
        descuento:
          type: number
          description: Monto de descuento por cupón (0 si no hay cupón)
        subtotal_con_descuento:
          type: number
        costo_envio:
          type: number
          description: Costo de envío estimado en CLP
        iva:
          type: number
          description: 19% sobre subtotal_con_descuento
        total:
          type: number
          description: Total final a pagar en CLP

    ConfirmarCheckoutRequest:
      type: object
      required: [direccion_envio, metodo_pago]
      properties:
        direccion_envio:
          type: object
          required: [calle, ciudad, region]
          properties:
            calle:
              type: string
              maxLength: 200
            ciudad:
              type: string
              maxLength: 100
            region:
              type: string
              maxLength: 100
            codigo_postal:
              type: string
              maxLength: 10
        metodo_pago:
          type: string
          enum: [webpay, mercadopago, transferencia]
          description: Método de pago seleccionado
        notas:
          type: string
          maxLength: 500
          description: Instrucciones adicionales de entrega (opcional)

    ConfirmarCheckoutResponse:
      type: object
      properties:
        pedido_id:
          type: integer
          description: ID del pedido creado
        estado:
          type: string
          example: "PENDIENTE_PAGO"
        total:
          type: number
        url_pago:
          type: string
          format: uri
          description: URL de redirección al proveedor de pago
        expira_en:
          type: string
          format: date-time
          description: Fecha/hora límite para completar el pago (30 minutos)

    Error:
      type: object
      properties:
        codigo:
          type: string
        mensaje:
          type: string
        detalles:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Token ausente o inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
