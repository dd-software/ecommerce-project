openapi: 3.0.0
info:
  title: API Carrito
  description: |
    Contrato de API para el módulo de carrito de compras del sistema ecommerce.
    Gestiona la creación, consulta, modificación y eliminación de ítems en el
    carrito de compras del usuario autenticado.
    
    Reglas de negocio:
    - Cada usuario puede tener un único carrito activo.
    - La cantidad de un ítem no puede superar el stock disponible del producto.
    - El carrito se invalida si pasan más de 48 horas sin actividad.
    - Los precios se calculan al momento de la consulta (no se almacenan).
    - Un producto inactivo o sin stock es eliminado automáticamente del carrito.
  version: 1.0.0
  contact:
    name: Equipo Contratos API
servers:
  - url: /api/v1
    description: Servidor principal

security:
  - bearerAuth: []

tags:
  - name: carrito
    description: Gestión del carrito de compras

paths:
  /api/carrito:
    get:
      tags: [carrito]
      summary: Obtener carrito activo del usuario
      description: |
        Retorna el carrito activo del usuario autenticado con todos sus ítems.
        Calcula el subtotal, impuestos (19% IVA) y total en tiempo real.
        Si no existe un carrito activo, retorna uno vacío.
      operationId: obtenerCarrito
      responses:
        '200':
          description: Carrito del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrito'
              example:
                id: 88
                usuario_id: 42
                items:
                  - id: 1
                    producto_id: 15
                    nombre_producto: "Zapatilla Running Pro"
                    cantidad: 2
                    precio_unitario: 49990
                    subtotal: 99980
                subtotal: 99980
                iva: 18996
                total: 118976
                actualizado_en: "2025-06-07T10:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [carrito]
      summary: Vaciar el carrito
      description: Elimina todos los ítems del carrito activo del usuario.
      operationId: vaciarCarrito
      responses:
        '200':
          description: Carrito vaciado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MensajeSimple'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/carrito/items:
    post:
      tags: [carrito]
      summary: Agregar ítem al carrito
      description: |
        Agrega un producto al carrito del usuario.
        Si el producto ya existe en el carrito, incrementa la cantidad.
        Valida que la cantidad solicitada no supere el stock disponible.
        Valida que el producto esté activo en el catálogo.
      operationId: agregarItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgregarItemRequest'
            example:
              producto_id: 15
              cantidad: 2
      responses:
        '200':
          description: Ítem agregado. Retorna el carrito actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrito'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Producto no encontrado o inactivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Stock insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                codigo: "STOCK_INSUFICIENTE"
                mensaje: "La cantidad solicitada supera el stock disponible"
                detalles:
                  - "Stock disponible: 5 unidades"

  /api/carrito/items/{item_id}:
    put:
      tags: [carrito]
      summary: Actualizar cantidad de un ítem
      description: |
        Modifica la cantidad de un ítem específico del carrito.
        Si la cantidad es 0, el ítem es eliminado automáticamente.
        Valida que la nueva cantidad no supere el stock disponible.
      operationId: actualizarItem
      parameters:
        - name: item_id
          in: path
          required: true
          description: ID del ítem en el carrito
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cantidad]
              properties:
                cantidad:
                  type: integer
                  minimum: 0
                  description: Nueva cantidad del ítem (0 para eliminar)
      responses:
        '200':
          description: Ítem actualizado. Retorna el carrito actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrito'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Stock insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [carrito]
      summary: Eliminar un ítem del carrito
      description: Elimina un ítem específico del carrito del usuario.
      operationId: eliminarItem
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ítem eliminado. Retorna el carrito actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrito'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ItemCarrito:
      type: object
      properties:
        id:
          type: integer
          description: ID del ítem dentro del carrito
        producto_id:
          type: integer
        nombre_producto:
          type: string
        cantidad:
          type: integer
          minimum: 1
        precio_unitario:
          type: number
          description: Precio unitario en CLP al momento de la consulta
        subtotal:
          type: number
          description: precio_unitario × cantidad

    Carrito:
      type: object
      properties:
        id:
          type: integer
        usuario_id:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemCarrito'
        subtotal:
          type: number
          description: Suma de subtotales de todos los ítems (sin IVA)
        iva:
          type: number
          description: 19% sobre el subtotal
        total:
          type: number
          description: subtotal + iva
        actualizado_en:
          type: string
          format: date-time

    AgregarItemRequest:
      type: object
      required: [producto_id, cantidad]
      properties:
        producto_id:
          type: integer
        cantidad:
          type: integer
          minimum: 1
          maximum: 99

    MensajeSimple:
      type: object
      properties:
        mensaje:
          type: string

    Error:
      type: object
      properties:
        codigo:
          type: string
        mensaje:
          type: string
        detalles:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Token ausente o inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'